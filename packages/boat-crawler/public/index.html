<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Boats - 40-60ft Fishing Boats</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 2.5em;
      color: #667eea;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      font-size: 1.1em;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 2em;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 0.9em;
      opacity: 0.9;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: white;
      font-size: 1.2em;
    }

    .boats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

    .boat-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .boat-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
    }

    .boat-image {
      width: 100%;
      height: 250px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3em;
      position: relative;
      overflow: hidden;
    }

    .boat-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .boat-image-placeholder {
      font-size: 4em;
      opacity: 0.5;
    }

    .boat-content {
      padding: 25px;
    }

    .boat-header {
      margin-bottom: 15px;
    }

    .boat-title {
      font-size: 1.4em;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }

    .boat-meta {
      color: #666;
      font-size: 0.9em;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .boat-price {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
      margin: 15px 0;
    }

    .boat-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
    }

    .detail-label {
      font-size: 0.8em;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .detail-value {
      font-size: 1em;
      color: #333;
      font-weight: 500;
    }

    .boat-link {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.2s;
      font-size: 0.9em;
    }

    .boat-link:hover {
      background: #5568d3;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      border: 1px solid #fcc;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: white;
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚤 Texas Boats</h1>
      <p class="subtitle">40-60ft Fishing Boats for Sale</p>
      <div class="stats" id="stats">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label">Total Boats</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-makes">-</div>
          <div class="stat-label">Unique Makes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-avg">-</div>
          <div class="stat-label">Avg Price</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-range">-</div>
          <div class="stat-label">Price Range</div>
        </div>
      </div>
    </header>

    <div id="content">
      <div class="loading">Loading boats...</div>
    </div>
  </div>

  <script>
    async function loadBoats() {
      try {
        // Load stats
        const statsRes = await fetch('/api/stats');
        const stats = await statsRes.json();
        
        document.getElementById('stat-total').textContent = stats.total || 0;
        document.getElementById('stat-makes').textContent = stats.makes || 0;
        document.getElementById('stat-avg').textContent = stats.avg_price 
          ? '$' + Math.round(stats.avg_price).toLocaleString() 
          : '-';
        document.getElementById('stat-range').textContent = stats.min_price && stats.max_price
          ? '$' + stats.min_price.toLocaleString() + ' - $' + stats.max_price.toLocaleString()
          : '-';

        // Load boats
        const boatsRes = await fetch('/api/boats');
        const boats = await boatsRes.json();

        const content = document.getElementById('content');
        
        if (boats.length === 0) {
          content.innerHTML = '<div class="empty">No boats found. Run the crawler to collect boats!</div>';
          return;
        }

        content.innerHTML = `
          <div class="boats-grid">
            ${boats.map(boat => `
              <div class="boat-card">
                <div class="boat-image">
                  ${boat.images && boat.images.length > 0
                    ? `<img src="${boat.images[0]}" alt="${boat.make} ${boat.model}" onerror="this.parentElement.innerHTML='<span class=\\'boat-image-placeholder\\'>🚤</span>'">`
                    : '<span class="boat-image-placeholder">🚤</span>'
                  }
                </div>
                <div class="boat-content">
                  <div class="boat-header">
                    <div class="boat-title">
                      ${boat.year || ''} ${boat.make || ''} ${boat.model || 'Unknown'}
                    </div>
                    <div class="boat-meta">
                      ${boat.length ? `<span>${boat.length}ft</span>` : ''}
                      ${boat.location ? `<span>📍 ${boat.location}</span>` : ''}
                      ${boat.seller_type ? `<span>${boat.seller_type}</span>` : ''}
                    </div>
                  </div>
                  <div class="boat-price">
                    ${boat.price ? '$' + boat.price.toLocaleString() : 'Price on request'}
                  </div>
                  ${boat.description 
                    ? `<p style="color: #666; font-size: 0.9em; margin-top: 10px; line-height: 1.5;">${boat.description.substring(0, 150)}${boat.description.length > 150 ? '...' : ''}</p>`
                    : ''
                  }
                  <div class="boat-details">
                    ${boat.year ? `
                      <div class="detail-item">
                        <div class="detail-label">Year</div>
                        <div class="detail-value">${boat.year}</div>
                      </div>
                    ` : ''}
                    ${boat.make ? `
                      <div class="detail-item">
                        <div class="detail-label">Make</div>
                        <div class="detail-value">${boat.make}</div>
                      </div>
                    ` : ''}
                    ${boat.length ? `
                      <div class="detail-item">
                        <div class="detail-label">Length</div>
                        <div class="detail-value">${boat.length}ft</div>
                      </div>
                    ` : ''}
                    ${boat.city ? `
                      <div class="detail-item">
                        <div class="detail-label">Location</div>
                        <div class="detail-value">${boat.city}, ${boat.state || 'TX'}</div>
                      </div>
                    ` : ''}
                  </div>
                  <a href="${boat.url}" target="_blank" class="boat-link">View on boats.com →</a>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (error) {
        document.getElementById('content').innerHTML = `
          <div class="error">
            <strong>Error loading boats:</strong> ${error.message}
          </div>
        `;
        console.error('Error:', error);
      }
    }

    // Load on page load
    loadBoats();

    // Refresh every 30 seconds
    setInterval(loadBoats, 30000);
  </script>
</body>
</html>
