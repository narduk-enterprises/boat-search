<!doctype html>
<html>
  <head>
    <title>2008 Viking 52 Convertible</title>
    <meta
      name="description"
      content="Immaculate 2008 Viking 52 Convertible with updated electronics, tower controls, and tuna-ready cockpit."
    >
  </head>
  <body>
    <main class="listing-detail">
      <section class="listing-hero">
        <h1>2008 Viking 52 Convertible</h1>
        <div class="listing-summary">
          <p class="listing-price">$489,000</p>
          <p class="listing-location">Orange Beach, Alabama</p>
        </div>
      </section>

      <section class="photo-gallery" data-testid="listing-gallery">
        <div class="gallery-rail">
          <img
            src="https://images.yachtworld.com/detail/viking-52-1.jpg"
            width="1600"
            height="900"
            alt="Port side profile"
          >
          <img
            src="https://images.yachtworld.com/detail/viking-52-2.jpg"
            width="1600"
            height="900"
            alt="Cockpit view"
          >
          <img
            src="https://images.yachtworld.com/detail/viking-52-3.jpg"
            width="1600"
            height="900"
            alt="Bridge seating"
          >
          <img
            src="https://images.yachtworld.com/detail/viking-52-4.jpg"
            width="1600"
            height="900"
            alt="Salon interior"
          >
        </div>
      </section>

      <section class="description-panel">
        <p>
          This 52 Viking is a tournament-rigged sportfish with fresh service records, teak cockpit,
          upgraded Garmin electronics, and an extensive tackle center.
        </p>
        <ul class="listing-facts">
          <li>Length Overall: 52 ft</li>
          <li>Condition: Used</li>
          <li>Brokered by Gulf Coast Yacht Group</li>
        </ul>
      </section>
    </main>
  </body>
</html>
